<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produzione - Italia Meal</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Roboto, Arial, sans-serif; background: #f2f4f7; min-height: 100vh; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 4px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #444; margin: 12px 0 4px; font-weight: 600; }
  input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fafafa; }
  .formato-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
  .formato-btn { padding: 14px; border: 2px solid #ddd; border-radius: 10px; text-align: center; background: #fff; font-weight: 600; cursor: pointer; }
  .formato-btn.active { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-warn { background: #fff; color: #dc2626; border: 2px solid #dc2626; }
  .btn:disabled { opacity: 0.5; }
  .msg { padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 10px; display: none; }
  .msg.ok { background: #dcfce7; color: #166534; display: block; }
  .msg.err { background: #fee2e2; color: #991b1b; display: block; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .logout { font-size: 13px; color: #666; text-decoration: underline; cursor: pointer; }
  #loginScreen { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
  .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; }
  .history-item:last-child { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: #dcfce7; color: #166534; }
</style>
</head>
<body>

<div id="loginScreen" class="container">
  <div class="card">
    <h1>Accesso Produzione</h1>
    <p class="sub">Inserisci i tuoi dati per iniziare</p>
    <label>Nome</label>
    <input type="text" id="loginNome" placeholder="Es. Marco">
    <label>Cognome</label>
    <input type="text" id="loginCognome" placeholder="Es. Rossi">
    <label>Numero Badge</label>
    <input type="text" id="loginBadge" inputmode="numeric" placeholder="Es. 022">
    <button class="btn btn-primary" id="btnLogin">Accedi</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="appScreen" class="container" style="display:none;">
  <div class="top-bar">
    <div>
      <h1 id="operaioNome">-</h1>
      <span class="sub" id="operaioReparto">-</span>
    </div>
    <span class="logout" id="btnLogout">Esci</span>
  </div>

  <div class="card">
    <h1>Nuovo inserimento</h1>
    <p class="sub">Dati del lotto/ciclo di produzione</p>

    <label>Linea / Macchina</label>
    <select id="selLinea"></select>

    <label>Formato</label>
    <div class="formato-grid" id="formatoGrid">
      <div class="formato-btn" data-val="0.5">0,5 kg</div>
      <div class="formato-btn" data-val="1">1 kg</div>
      <div class="formato-btn" data-val="3">3 kg</div>
    </div>

    <label>Temperatura (°C)</label>
    <input type="number" step="0.1" id="inTemp" placeholder="Es. 78.5">

    <label>Pressione (bar)</label>
    <input type="number" step="0.1" id="inPress" placeholder="Es. 2.3">

    <label>Tempo di ciclo (secondi)</label>
    <input type="number" step="1" id="inCiclo" placeholder="Es. 45">

    <label>Quantità prodotta (kg o pezzi)</label>
    <input type="number" step="0.1" id="inQta" placeholder="Es. 120">

    <label>Note (opzionale)</label>
    <textarea id="inNote" rows="2" placeholder="Eventuali osservazioni"></textarea>

    <button class="btn btn-primary" id="btnSalva">Salva inserimento</button>
    <div class="msg" id="prodMsg"></div>
  </div>

  <div class="card">
    <h1 style="font-size:16px;">Segnala un problema</h1>
    <p class="sub">Per guasti o anomalie sulla macchina</p>
    <label>Linea / Macchina</label>
    <select id="selLineaSegnalazione"></select>
    <label>Componente (se noto)</label>
    <input type="text" id="inComponente" placeholder="Es. Nastro trasportatore">
    <label>Descrizione</label>
    <textarea id="inDescSegnalazione" rows="2" placeholder="Cosa non funziona?"></textarea>
    <button class="btn btn-warn" id="btnSegnala">Invia segnalazione</button>
    <div class="msg" id="segMsg"></div>
  </div>

  <div class="card">
    <h1 style="font-size:16px;">I tuoi ultimi inserimenti</h1>
    <div id="historyList"><p class="sub">Caricamento...</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================
// CONFIGURAZIONE - inserisci le tue credenziali
// ============================================
const SUPABASE_URL = 'https://bzquqzgaaszguzcmvgbl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6cXVxemdhYXN6Z3V6Y212Z2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjI4NjUsImV4cCI6MjA5NjY5ODg2NX0.p4lwBT2HWVEGge8LqVYu_rA1kO4WFxtbvCFDe1kRxeY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null; // { id, nome, reparto }
let formatoSelezionato = null;

// --- Utility SHA-256 (stesso pattern usato in operaio.html) ---
async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}

// --- LOGIN ---
document.getElementById('btnLogin').addEventListener('click', () => {
  const nome = document.getElementById('loginNome').value.trim();
  const cognome = document.getElementById('loginCognome').value.trim();
  const badge = document.getElementById('loginBadge').value.trim();
  if (!nome || !cognome || !badge) return showMsg('loginMsg', 'Compila nome, cognome e badge', false);
  currentUser = { id: null, nome: nome + ' ' + cognome, badge, reparto: null };
  sessionStorage.setItem('produzione_user', JSON.stringify(currentUser));
  entraNellApp();
});

document.getElementById('btnLogout').addEventListener('click', () => {
  sessionStorage.removeItem('produzione_user');
  location.reload();
});

async function entraNellApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('operaioNome').textContent = currentUser.nome;
  document.getElementById('operaioReparto').textContent = currentUser.reparto || '';
  await caricaLinee();
  await caricaStorico();
}

// --- Carica linee attive nei due select ---
async function caricaLinee() {
  const { data, error } = await sb.from('linee_produzione').select('*').eq('attiva', true).order('nome');
  if (error || !data) return;
  const opts = data.map(l => `<option value="${l.id}">${l.nome}${l.reparto ? ' - ' + l.reparto : ''}</option>`).join('');
  document.getElementById('selLinea').innerHTML = opts;
  document.getElementById('selLineaSegnalazione').innerHTML = opts;
}

// --- Selezione formato ---
document.querySelectorAll('.formato-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.formato-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    formatoSelezionato = btn.dataset.val;
  });
});

// --- Salva inserimento produzione ---
document.getElementById('btnSalva').addEventListener('click', async () => {
  if (!formatoSelezionato) return showMsg('prodMsg', 'Seleziona un formato', false);
  const linea_id = document.getElementById('selLinea').value;
  if (!linea_id) return showMsg('prodMsg', 'Seleziona una linea', false);

  const payload = {
    linea_id,
    operaio_id: currentUser.id,
    operaio_nome: currentUser.nome,
    formato: formatoSelezionato,
    temperatura: parseFloat(document.getElementById('inTemp').value) || null,
    pressione: parseFloat(document.getElementById('inPress').value) || null,
    tempo_ciclo: parseFloat(document.getElementById('inCiclo').value) || null,
    quantita_prodotta: parseFloat(document.getElementById('inQta').value) || null,
    note: document.getElementById('inNote').value || null
  };

  const { error } = await sb.from('produzione_log').insert(payload);
  if (error) {
    showMsg('prodMsg', 'Errore salvataggio: ' + error.message, false);
    return;
  }
  showMsg('prodMsg', 'Inserimento salvato correttamente', true);
  // reset form
  document.querySelectorAll('.formato-btn').forEach(b => b.classList.remove('active'));
  formatoSelezionato = null;
  ['inTemp','inPress','inCiclo','inQta','inNote'].forEach(id => document.getElementById(id).value = '');
  await caricaStorico();
});

// --- Invia segnalazione ---
document.getElementById('btnSegnala').addEventListener('click', async () => {
  const linea_id = document.getElementById('selLineaSegnalazione').value;
  const descrizione = document.getElementById('inDescSegnalazione').value.trim();
  if (!linea_id || !descrizione) return showMsg('segMsg', 'Compila linea e descrizione', false);

  const payload = {
    linea_id,
    componente: document.getElementById('inComponente').value || null,
    tipo: 'segnalazione',
    descrizione,
    autore_id: currentUser.id,
    autore_nome: currentUser.nome,
    ruolo_autore: 'operaio',
    stato: 'aperta'
  };

  const { error } = await sb.from('manutenzione_log').insert(payload);
  if (error) {
    showMsg('segMsg', 'Errore invio: ' + error.message, false);
    return;
  }
  showMsg('segMsg', 'Segnalazione inviata', true);
  document.getElementById('inComponente').value = '';
  document.getElementById('inDescSegnalazione').value = '';
});

// --- Storico ultimi inserimenti dell'operaio ---
async function caricaStorico() {
  const { data, error } = await sb.from('produzione_log').select('*, linee_produzione(nome)')
    .eq('operaio_id', currentUser.id).order('created_at', { ascending: false }).limit(5);
  const el = document.getElementById('historyList');
  if (error || !data || data.length === 0) {
    el.innerHTML = '<p class="sub">Nessun inserimento ancora</p>';
    return;
  }
  el.innerHTML = data.map(d => {
    const dt = new Date(d.created_at).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    return `<div class="history-item">
      <span class="badge badge-ok">${d.formato} kg</span>
      ${d.linee_produzione ? d.linee_produzione.nome : ''} - ${dt}
      ${d.temperatura ? ' · ' + d.temperatura + '°C' : ''}
    </div>`;
  }).join('');
}

// --- Auto-login se sessione presente ---
(function initSession() {
  const saved = sessionStorage.getItem('produzione_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    entraNellApp();
  }
})();
</script>
</body>
</html>
