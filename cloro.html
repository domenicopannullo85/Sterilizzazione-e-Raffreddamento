<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloro/Temperatura - Italia Meal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Roboto, Arial, sans-serif; background: #f2f4f7; min-height: 100vh; }
  .container { max-width: 520px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  h1 { font-size: 19px; color: #1a1a2e; margin-bottom: 4px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: #444; margin: 10px 0 4px; font-weight: 600; }
  input, select, textarea { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fafafa; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 14px; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-photo { background: #fff; color: #2563eb; border: 2px dashed #2563eb; }
  .btn-secondary { background: #f1f5f9; color: #333; }
  .btn-print { background: #16a34a; color: #fff; }
  .btn-del { background: #fee2e2; color: #991b1b; padding: 8px; font-size: 13px; margin-top: 8px; }
  .btn:disabled { opacity: 0.5; }
  .msg { padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 10px; display: none; }
  .msg.ok { background: #dcfce7; color: #166534; display: block; }
  .msg.err { background: #fee2e2; color: #991b1b; display: block; }
  .msg.info { background: #dbeafe; color: #1e40af; display: block; }
  #loginScreen { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
  .logout { font-size: 13px; color: #666; text-decoration: underline; cursor: pointer; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .hidden { display: none; }
  .navbar { display: flex; gap: 8px; margin-bottom: 16px; }
  .navbar a { flex: 1; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 600; background: #f1f5f9; color: #333; }
  .navbar a.active { background: #2563eb; color: #fff; }
  .riga-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-top: 10px; background: #fafbfc; }
  .riga-head { font-weight: 700; font-size: 13px; color: #2563eb; margin-bottom: 6px; }
</style>
</head>
<body>

<div id="loginScreen" class="container">
  <div class="card">
    <h1>Cloro/Temperatura (CCP3)</h1>
    <p class="sub">Inserisci i tuoi dati per iniziare</p>
    <label>Nome</label>
    <input type="text" id="loginNome" placeholder="Es. Marco">
    <label>Cognome</label>
    <input type="text" id="loginCognome" placeholder="Es. Rossi">
    <label>Numero Badge</label>
    <input type="text" id="loginBadge" inputmode="numeric" placeholder="Es. 022">
    <button class="btn btn-primary" id="btnLogin">Accedi</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="appScreen" class="container" style="display:none;">
  <div class="top-bar">
    <h1 id="operaioNome" style="font-size:16px;">-</h1>
    <span class="logout" id="btnLogout">Esci</span>
  </div>

  <div class="navbar">
    <a href="sterilizzazione.html">Sterilizzazione</a>
    <a href="cloro.html" class="active">Cloro/Temperatura</a>
  </div>

  <!-- STEP 1: testata -->
  <div class="card" id="cardTestata">
    <h1>Nuova scheda MOD.42</h1>
    <p class="sub">Controllo cloro e temperatura dopo raffreddamento</p>

    <label>Formato</label>
    <select id="selLinea"></select>
    <div class="row2">
      <div><label>Data</label><input type="date" id="inData"></div>
      <div><label>Lotto</label><input type="text" id="inLotto"></div>
    </div>

    <button class="btn btn-primary" id="btnCreaTestata">Crea scheda e continua</button>
    <div class="msg" id="testataMsg"></div>
  </div>

  <!-- STEP 2: letture orarie -->
  <div class="card hidden" id="cardLetture">
    <h1>Verifica oraria</h1>
    <p class="sub">ppm CLORO (0.5–1.0 ppm) · Temperatura centro scatola (40°-45°C)</p>

    <input type="file" accept="image/*" capture="environment" id="fotoInput" style="display:none;">
    <button class="btn btn-photo" id="btnFoto">📷 Carica foto del foglio</button>
    <div class="msg" id="fotoMsg"></div>

    <div id="righeContainer"></div>

    <button class="btn btn-secondary" id="btnAggiungiRiga">+ Aggiungi riga manuale</button>
    <button class="btn btn-primary" id="btnSalvaLetture">Salva letture</button>
    <div class="msg" id="lettureMsg"></div>

    <button class="btn btn-print" id="btnStampa">🖨️ Vedi e stampa scheda compilata</button>
  </div>

  <div class="card">
    <h1 style="font-size:15px;">Ultime schede</h1>
    <div id="storicoList"><p class="sub">Caricamento...</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://bzquqzgaaszguzcmvgbl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6cXVxemdhYXN6Z3V6Y212Z2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjI4NjUsImV4cCI6MjA5NjY5ODg2NX0.p4lwBT2HWVEGge8LqVYu_rA1kO4WFxtbvCFDe1kRxeY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentLogId = null;
let currentLinea = null;
let rigaCount = 0;
let lineeCache = [];

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

document.getElementById('btnLogin').addEventListener('click', () => {
  const nome = document.getElementById('loginNome').value.trim();
  const cognome = document.getElementById('loginCognome').value.trim();
  const badge = document.getElementById('loginBadge').value.trim();
  if (!nome || !cognome || !badge) return showMsg('loginMsg', 'Compila nome, cognome e badge', 'err');
  currentUser = { id: null, nome: nome + ' ' + cognome, badge };
  sessionStorage.setItem('cloro_user', JSON.stringify(currentUser));
  entraNellApp();
});
document.getElementById('btnLogout').addEventListener('click', () => { sessionStorage.removeItem('cloro_user'); location.reload(); });

async function entraNellApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('operaioNome').textContent = currentUser.nome;
  document.getElementById('inData').value = new Date().toISOString().split('T')[0];
  await caricaLinee();
  await caricaStorico();
}

async function caricaLinee() {
  const { data } = await sb.from('linee_sterilizzazione').select('*').order('nome');
  lineeCache = data || [];
  document.getElementById('selLinea').innerHTML = lineeCache.map(l => `<option value="${l.id}">${l.nome}</option>`).join('');
}

document.getElementById('btnCreaTestata').addEventListener('click', async () => {
  const lineaId = document.getElementById('selLinea').value;
  currentLinea = lineeCache.find(l => l.id === lineaId);
  const payload = {
    linea_id: lineaId,
    formato: currentLinea ? currentLinea.nome : null,
    data: document.getElementById('inData').value,
    lotto: document.getElementById('inLotto').value || null,
    addetto_id: null,
    addetto_nome: currentUser.nome
  };
  const { data, error } = await sb.from('cloro_log').insert(payload).select().single();
  if (error) return showMsg('testataMsg', 'Errore: ' + error.message, 'err');
  currentLogId = data.id;
  showMsg('testataMsg', 'Scheda creata. Ora aggiungi le letture orarie sotto.', 'ok');
  document.getElementById('cardLetture').classList.remove('hidden');
  document.getElementById('righeContainer').innerHTML = '';
  aggiungiRigaVuota();
});

function aggiungiRigaVuota(preset) {
  rigaCount++;
  const container = document.getElementById('righeContainer');
  const div = document.createElement('div');
  div.className = 'riga-card';
  div.innerHTML = `
    <div class="riga-head">Riga ${rigaCount}</div>
    <label>Ora</label>
    <input type="time" class="c-ora" value="${preset?.ora || ''}">
    <div class="row2">
      <div><label>ppm Cloro</label><input type="number" step="0.01" class="c-ppm" value="${preset?.ppm_cloro ?? ''}"></div>
      <div><label>Temp. centro scatola</label><input type="number" step="0.1" class="c-temp" value="${preset?.temp_centro_scatola ?? ''}"></div>
    </div>
    <label>Note</label>
    <input type="text" class="c-note" value="${preset?.note || ''}">
    <button class="btn btn-del" onclick="this.closest('.riga-card').remove()">Rimuovi riga</button>
  `;
  container.appendChild(div);
}
document.getElementById('btnAggiungiRiga').addEventListener('click', () => aggiungiRigaVuota());

document.getElementById('btnSalvaLetture').addEventListener('click', async () => {
  const cards = Array.from(document.querySelectorAll('#righeContainer .riga-card'));
  const rows = cards.map(card => ({
    log_id: currentLogId,
    ora: card.querySelector('.c-ora').value || null,
    ppm_cloro: parseFloat(card.querySelector('.c-ppm').value) || null,
    temp_centro_scatola: parseFloat(card.querySelector('.c-temp').value) || null,
    note: card.querySelector('.c-note').value || null
  }));
  if (rows.length === 0) return showMsg('lettureMsg', 'Nessuna riga da salvare', 'err');
  const { error } = await sb.from('cloro_letture').insert(rows);
  if (error) return showMsg('lettureMsg', 'Errore: ' + error.message, 'err');
  showMsg('lettureMsg', rows.length + ' letture salvate correttamente', 'ok');
  document.getElementById('righeContainer').innerHTML = '';
  await caricaStorico();
});

// --- Foto -> estrazione automatica ---
document.getElementById('btnFoto').addEventListener('click', () => document.getElementById('fotoInput').click());
document.getElementById('fotoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!currentLogId) { showMsg('fotoMsg', 'Crea prima la scheda testata', 'err'); return; }
  showMsg('fotoMsg', 'Lettura foto in corso...', 'info');
  document.getElementById('btnFoto').disabled = true;
  try {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = () => rej(new Error('Lettura file fallita'));
      r.readAsDataURL(file);
    });
    const promptText = 'Questa e\' una scheda cartacea "Controllo cloro e temperatura dopo raffreddamento" compilata a mano. ' +
      'Estrai SOLO le righe con valori scritti (ignora righe vuote). ' +
      'Rispondi ESCLUSIVAMENTE con un array JSON, nessun testo prima o dopo, formato: ' +
      '[{"ora":"HH:MM","ppm_cloro":numero,"temp_centro_scatola":numero,"note":"testo"}]. Usa null per campi non leggibili o vuoti.';
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
            { type: 'text', text: promptText }
          ]
        }]
      })
    });
    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const righe = JSON.parse(clean);
    if (!Array.isArray(righe) || righe.length === 0) {
      showMsg('fotoMsg', 'Non ho trovato righe compilate nella foto.', 'err');
      return;
    }
    righe.forEach(r => aggiungiRigaVuota(r));
    showMsg('fotoMsg', righe.length + ' righe lette dalla foto. Controlla i valori prima di salvare.', 'ok');
  } catch (err) {
    showMsg('fotoMsg', 'Errore lettura foto: ' + err.message, 'err');
  } finally {
    document.getElementById('btnFoto').disabled = false;
    e.target.value = '';
  }
});

// --- Stampa scheda compilata ---
document.getElementById('btnStampa').addEventListener('click', async () => {
  if (!currentLogId) return;
  const { data: log } = await sb.from('cloro_log').select('*').eq('id', currentLogId).single();
  const { data: righe } = await sb.from('cloro_letture').select('*').eq('log_id', currentLogId).order('ora');

  const righeHtml = (righe || []).map(r => `
    <tr>
      <td>${r.ora || ''}</td>
      <td>${r.ppm_cloro ?? ''}</td>
      <td>${r.temp_centro_scatola ?? ''}</td>
      <td>${r.note || ''}</td>
    </tr>`).join('') + Array(Math.max(0, 15 - (righe || []).length)).fill('<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>').join('');

  const html = `
    <html><head><title>MOD.42 - ${log.lotto || ''}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:24px;color:#111}
      h1{font-size:18px;margin-bottom:4px}
      .sub{font-size:13px;color:#555;margin-bottom:16px}
      table{width:100%;border-collapse:collapse;margin-top:12px}
      th,td{border:1px solid #333;padding:8px;text-align:center;font-size:13px}
      th{background:#eee}
      .head-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
      .footer{margin-top:24px;font-size:13px}
    </style></head><body>
    <h1>ITALIA MEAL S.r.l. - Controllo cloro e temperatura dopo raffreddamento (CCP3)</h1>
    <div class="sub">MOD.42</div>
    <div class="head-row"><span><strong>Formato:</strong> ${log.formato || ''}</span><span><strong>Data:</strong> ${log.data || ''}</span><span><strong>Lotto:</strong> ${log.lotto || ''}</span></div>
    <table>
      <thead><tr><th>Ora</th><th>ppm Cloro (0.5-1.0)</th><th>Temp. centro scatola (40-45°C)</th><th>Note</th></tr></thead>
      <tbody>${righeHtml}</tbody>
    </table>
    <div class="footer">Addetto controlli di linea: <strong>${log.addetto_nome || ''}</strong></div>
    <script>window.onload = () => window.print();<\/script>
    </body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
});

async function caricaStorico() {
  const { data, error } = await sb.from('cloro_log').select('*').order('created_at', { ascending: false }).limit(5);
  const el = document.getElementById('storicoList');
  if (error || !data || data.length === 0) { el.innerHTML = '<p class="sub">Nessuna scheda ancora</p>'; return; }
  el.innerHTML = data.map(d => {
    const dt = new Date(d.created_at).toLocaleDateString('it-IT');
    return `<div style="border-bottom:1px solid #eee;padding:8px 0;font-size:13px;">
      <strong>${d.formato || ''}</strong> - Lotto ${d.lotto || '-'} - ${dt}
    </div>`;
  }).join('');
}

(function initSession() {
  const saved = sessionStorage.getItem('cloro_user');
  if (saved) { currentUser = JSON.parse(saved); entraNellApp(); }
})();
</script>
</body>
</html>
